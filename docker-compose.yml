version: '3.7'

services:

  php:
    container_name: ieducar-php
    build: docker/php
    # command: sh ./docker/php/start
    links:
      - postgres
      - redis
    environment:
      CACHE_DRIVER: redis
      REDIS_HOST: redis
      DB_HOST: postgres
      PGPASSWORD: ieducar
    working_dir: /var/www/ieducar
    volumes:
      - ./:/var/www/ieducar
    depends_on:
      - postgres
      - redis
    networks:
      - ieducar

  nginx:
    container_name: ieducar-nginx
    image: nginx:alpine
    links:
      - php
    working_dir: /var/www/ieducar
    volumes:
      - ./:/var/www/ieducar
      - ./docker/nginx:/etc/nginx/conf.d/
    depends_on:
      - php
    networks:
      - ieducar
    

  postgres:
    container_name: ieducar-postgres
    image: postgres:alpine
    environment:
      POSTGRES_DB: ieducar
      POSTGRES_USER: ieducar
      POSTGRES_PASSWORD: ieducar
    volumes:
      - postgres:/var/lib/postgresql/data
      - /home/usuario/projetos/edu/backup:/backup
      # command: executar manualmente dentro do container ieducar-postgres os comandos do arquivo ./script/restore-backup
    networks:
      - ieducar

  redis:
    container_name: ieducar-redis
    image: redis:alpine
    restart: always
    networks:
      - ieducar

volumes:
    postgres:

networks:
  ieducar: