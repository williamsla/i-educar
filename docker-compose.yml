version: '3.7'
x-php: &php
  build:
    context: docker/php
    args:
      PHP_VERSION: 8.4
      COMPOSER_VERSION: 2.8
      HOST_UID: ${HOST_UID:-1001}
      HOST_GID: ${HOST_GID:-1001}
  image: php:8.4-ieducar
  working_dir: /var/www/ieducar
  volumes:
    - ./:/var/www/ieducar
  links:
    - postgres
    - redis
  depends_on:
    postgres:
      condition: service_started
    redis:
      condition: service_started
  environment:
    CACHE_DRIVER: redis
    REDIS_HOST: redis
    DB_HOST: postgres
    PGPASSWORD: ieducar
  extra_hosts:
    - host.docker.internal:host-gateway

services:

  php:
    <<: *php
    container_name: ieducar-php
    build: docker/php
    links:
      - postgres
      - redis
    environment:
      CACHE_DRIVER: redis
      REDIS_HOST: redis
      DB_HOST: postgres
      PGPASSWORD: ieducar
    working_dir: /var/www/ieducar
    volumes:
      - ./:/var/www/ieducar
      - ../i-educar-reports-package:/var/www/ieducar/packages/portabilis/i-educar-reports-package
    entrypoint: ["sh", "/usr/local/bin/entrypoint.sh"] 

  fpm:
    <<: *php
    container_name: ieducar-fpm

  horizon:
    <<: *php
    container_name: ieducar-horizon
    command: /var/www/ieducar/artisan horizon
    restart: always

  nginx:
    container_name: ieducar-nginx
    image: nginx:1.28-alpine
    links:
      - fpm
    working_dir: /var/www/ieducar
    volumes:
      - ./:/var/www/ieducar
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
      - ./docker/nginx/snippets:/etc/nginx/snippets/
    ports:
      - ${DOCKER_NGINX_PORT:-80}:80
      - ${DOCKER_NGINX_SSL_PORT:-443}:443
    command: tail -f /dev/null
    depends_on: []

  postgres:
    container_name: ieducar-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ieducar
      POSTGRES_USER: ieducar
      POSTGRES_PASSWORD: ieducar
      PGUSER: ieducar
    volumes:
      - postgres:/var/lib/postgresql/data
      - ../backup:/backup
    command: >
      postgres
      -c logging_collector=off
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_duration_statement=0
    ports:
      - ${DOCKER_POSTGRES_PORT:-5432}:5432

  redis:
    container_name: ieducar-redis
    image: redis:8-alpine
    restart: always
    ports:
      - ${DOCKER_REDIS_PORT:-6379}:6379

volumes:
    postgres:
